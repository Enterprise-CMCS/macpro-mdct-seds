# This file is managed by macpro-mdct-core so if you'd like to change it let's do it there
name: Destroy

on:
  delete:
  pull_request:
    types:
      - closed

concurrency:
  # Same group as deploy.yml to prevent simultaneous deploy/destroy
  group: ${{ github.event.ref }}

permissions:
  actions: read
  contents: read
  id-token: write

env:
  branchName: ${{ github.event.pull_request.head.ref || github.ref_name }}

jobs:
  destroy:
    name: Destroy
    if: ((github.event.ref_type == 'branch') && !contains('skipci', github.event.ref)) || (github.event.pull_request && startsWith(github.event.pull_request.head.ref, 'dependabot'))
    environment: dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: ".nvmrc"

      - name: Enable Corepack
        run: corepack enable

      - name: Set branch_name
        run: |
          BRANCH_NAME=$(./.github/setBranchName.ts ${{ env.branchName }})
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_ENV

      - name: Configure AWS credentials for GitHub Actions
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_TO_ASSUME }}

      - name: Destroy
        run: ./run destroy --stage $branch_name --verify false
        env:
          PROJECT: ${{ vars.APP_NAME_LOWER }}

  notify_on_destroy_failure:
    name: Destroy failure notification
    if: failure()
    needs: destroy
    runs-on: ubuntu-latest
    steps:
      - name: Slack notification
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2
        env:
          MSG_MINIMAL: true
          SLACK_TITLE: ":boom: A destroy action has failed on ${{ github.repository }}."
          SLACK_WEBHOOK: ${{ secrets.INTEGRATIONS_SLACK_WEBHOOK }}
